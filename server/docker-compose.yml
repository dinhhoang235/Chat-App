services:
  app:
    build:
      context: .
    container_name: chat-app
    env_file: .env
    environment:
      DATABASE_HOST: mysql
      DATABASE_USER: ${MYSQL_USER}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      DATABASE_NAME: ${MYSQL_DATABASE}
      DATABASE_PORT: ${MYSQL_PORT}
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:${MYSQL_PORT}/${MYSQL_DATABASE}"
      NODE_ENV: development
      MINIO_ENDPOINT: minio
    ports:
      - "${PORT}:3000"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - chat-network
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./.env:/app/.env
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - chat-network

  mysql:
    image: mysql:8.0
    container_name: chat-mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - chat-network

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: chat-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: chat-livekit
    ports:
      - "7880:7880"
      - "3479:3479"
      - "3479:3479/udp"
      - "5348:5348"
      - "5348:5348/udp"
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_TURN_ENABLED: "${LIVEKIT_TURN_ENABLED}"
      LIVEKIT_TURN_UDP_PORT: "${LIVEKIT_TURN_UDP_PORT}"
      LIVEKIT_TURN_TLS_PORT: "${LIVEKIT_TURN_TLS_PORT}"
      LIVEKIT_TURN_RELAY_RANGE_START: "${LIVEKIT_TURN_RELAY_RANGE_START}"
      LIVEKIT_TURN_RELAY_RANGE_END: "${LIVEKIT_TURN_RELAY_RANGE_END}"
      LIVEKIT_TURN_DOMAIN: "${LIVEKIT_TURN_DOMAIN}"
      LIVEKIT_TURN_EXTERNAL_TLS: "${LIVEKIT_TURN_EXTERNAL_TLS}"
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7880/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    container_name: chat-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49152-49400:49152-49400/udp"
    command: >
      -n
      --log-file=stdout
      --external-ip=$${TURN_EXTERNAL_IP}
      --listening-ip=0.0.0.0
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49152
      --max-port=49400
      --realm=chat.local
      --user=$${TURN_USERNAME}:$${TURN_PASSWORD}
      --lt-cred-mech
      --no-multicast-peers
      --no-cli
    env_file: .env
    restart: unless-stopped
    networks:
      - chat-network

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  chat-network: